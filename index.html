<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen Gunk Scrubber</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0f7fa; --primary: #00acc1; --dark: #006064; --accent: #ffb300;
            --white: #ffffff; --shelf: #2d1b0d; --success: #4caf50; --error: #f44336;
            --gunk: #654321;
        }
        
        * { touch-action: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--dark); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 1s; }

        header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.9); z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .game-title { font-size: 1.8rem; font-weight: 700; color: var(--dark); }
        .stat-card { background: var(--white); padding: 12px 25px; border-radius: 50px; font-weight: 700; border: 3px solid var(--primary); font-size: 1.4rem; }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 1.2rem; }
        .dev-btn { opacity: 0.2; background: none; border: none; cursor: pointer; font-size: 1.2rem; }
        .reset-btn { background: var(--error); color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: 700; cursor: pointer; }

        #game-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        
        #decor-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .decor-item { position: absolute; opacity: 0; transition: opacity 1s; width: 100%; height: 100%; }
        
        #bonsai-decor { font-size: 25rem; left: 50%; top: 50%; transform: translate(-50%, -50%); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); width: auto; height: auto; }
        #garden-decor { font-size: 5rem; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; width: auto; }

        .petal { position: absolute; color: #ffb7c5; font-size: 1.5rem; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        .fish { font-size: 4rem; animation: swim 10s infinite linear; position: absolute; opacity: 0.6; }
        @keyframes swim {
            0% { left: -10%; transform: scaleX(1); }
            45% { transform: scaleX(1); }
            50% { left: 110%; transform: scaleX(-1); }
            95% { transform: scaleX(-1); }
            100% { left: -10%; transform: scaleX(1); }
        }

        #game-floor { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 95%; max-width: 700px; justify-content: center; position: relative; }

        .work-station { position: relative; width: 200px; height: 140px; background: var(--white); border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--white); box-shadow: 0 8px 25px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Fixed: Word box starts BEHIND the canvas */
        .word-box { display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; z-index: 1; pointer-events: none; position: absolute; width: 100%; height: 100%; }
        .word-box .emoji { font-size: 3.5rem; line-height: 1; }
        .word-box.active { z-index: 10; pointer-events: auto; cursor: grab; }
        
        .word-box.dragging { 
            position: fixed !important; 
            z-index: 99999 !important; 
            pointer-events: none; 
            transform: scale(1.1); 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.4); 
            width: 180px;
            height: 120px;
        }
        .word-box.returning { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Fixed: Canvas starts ON TOP of the word-box */
        canvas { position: absolute; top: 0; left: 0; z-index: 5; border-radius: 16px; width: 100%; height: 100%; cursor: crosshair; }

        #buckets { display: flex; gap: 15px; padding: 25px 0; width: 100%; justify-content: center; background: rgba(255,255,255,0.6); border-top: 3px solid var(--primary); z-index: 50; position: relative; }
        .bucket { width: 200px; height: 140px; background: var(--white); border: 4px dashed var(--primary); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 1.8rem; transition: 0.2s; }
        
        .bucket.correct-flash { background: var(--success) !important; color: white; transform: scale(1.1); }
        .bucket.wrong-flash { background: var(--error) !important; color: white; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        #shop-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; flex-direction: column; align-items: center; padding: 20px; }
        .shop-frame { background: var(--shelf); width: 100%; max-width: 500px; border: 8px solid #5d4037; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .shop-tabs { display: flex; background: #1b1108; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #a1887f; font-weight: 700; cursor: pointer; border-bottom: 4px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(255,255,255,0.05); }
        .shop-content { padding: 20px; height: 400px; overflow-y: auto; color: white; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .shop-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; text-align: center; }
        .buy-btn { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: none; background: var(--success); color: white; font-weight: 700; cursor: pointer; }
        .buy-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        .feedback { position: fixed; font-weight: 700; pointer-events: none; z-index: 100000; animation: floatUp 0.8s ease-out forwards; font-size: 1.5rem; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body>

    <header>
        <div class="game-title">✨ Zen Scrubber</div>
        <div class="stat-card">💰 $<span id="m-display">0</span></div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="dev-btn" onclick="devMode()">🛠️</button>
            <button class="nav-btn" onclick="toggleShop(true)">🛒 Shop</button>
            <button class="reset-btn" onclick="confirmReset()">🔄</button>
        </div>
    </header>

    <div id="game-container">
        <div id="decor-layer">
            <div id="bonsai-decor" class="decor-item">🪴</div>
            <div id="garden-decor" class="decor-item">🪨🪨🪨🪨</div>
            <div id="sakura-decor" class="decor-item"></div>
            <div id="aquarium-decor" class="decor-item">
                <span class="fish" style="animation-delay: 0s; top: 15%">🐠</span>
                <span class="fish" style="animation-delay: -4s; top: 45%">🐋</span>
                <span class="fish" style="animation-delay: -7s; top: 75%">🐡</span>
            </div>
        </div>
        <div id="game-floor"></div>
    </div>

    <div id="buckets">
        <div class="bucket" id="bucket-going"><span class="b-emoji">🏃</span> going</div>
        <div class="bucket" id="bucket-doing"><span class="b-emoji">🥋</span> doing</div>
        <div class="bucket" id="bucket-playing"><span class="b-emoji">🎮</span> playing</div>
    </div>

    <div id="shop-overlay">
        <h1 style="color: var(--accent); margin-bottom: 15px;">Zen Emporium</h1>
        <div class="shop-frame">
            <div class="shop-tabs">
                <button class="tab-btn active" onclick="switchTab('upgrades', this)">Upgrades</button>
                <button class="tab-btn" onclick="switchTab('visuals', this)">Visuals</button>
            </div>
            <div class="shop-content">
                <div id="tab-upgrades" class="shop-grid"></div>
                <div id="tab-visuals" class="shop-grid" style="display:none"></div>
            </div>
        </div>
        <button class="nav-btn" style="margin-top: 20px; background: #5d4037;" onclick="toggleShop(false)">Back to Zen</button>
    </div>

<script>
    let state = {
        money: 0, brush: 25, pay: 10, tiles: 1,
        costs: { area: 15, expand: 100, pay: 50, bonsai: 750, aquarium: 500, sakura: 500, garden: 600 },
        owned: { bonsai: false, aquarium: false, sakura: false, garden: false },
        isDrawing: false, dragTarget: null, originalParent: null
    };

    const activities = [
        { emoji: "🏊", text: "swimming", verb: "going" }, { emoji: "🥋", text: "karate", verb: "doing" },
        { emoji: "🎸", text: "the guitar", verb: "playing" }, { emoji: "🧘", text: "yoga", verb: "doing" },
        { emoji: "🏃", text: "running", verb: "going" }, { emoji: "♟️", text: "chess", verb: "playing" },
        { emoji: "🎹", text: "the piano", verb: "playing" }, { emoji: "🚲", text: "cycling", verb: "going" }
    ];

    function init() {
        const floor = document.getElementById('game-floor');
        floor.innerHTML = '';
        let shuffled = [...activities].sort(() => 0.5 - Math.random());
        for(let i=0; i < state.tiles; i++) {
            const act = shuffled[i % shuffled.length];
            const station = document.createElement('div');
            station.className = 'work-station';
            station.id = `station-${i}`;
            station.innerHTML = `
                <div class="word-box" id="word-${i}" data-verb="${act.verb}" data-idx="${i}">
                    <span class="emoji">${act.emoji}</span><span class="label">${act.text}</span>
                </div>
                <canvas width="200" height="140"></canvas>
            `;
            floor.appendChild(station);
            const can = station.querySelector('canvas');
            const ctx = can.getContext('2d');
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--gunk').trim();
            ctx.fillRect(0,0,200,140);

            can.onpointerdown = (e) => { e.preventDefault(); state.isDrawing = true; scrub(e, i); can.setPointerCapture(e.pointerId); };
            can.onpointermove = (e) => { if(state.isDrawing) scrub(e, i); };
            can.onpointerup = () => state.isDrawing = false;

            const wb = station.querySelector('.word-box');
            wb.onpointerdown = (e) => {
                if(!wb.classList.contains('active') || wb.classList.contains('returning')) return;
                e.preventDefault(); 
                state.dragTarget = wb;
                state.originalParent = wb.parentElement;
                
                document.body.appendChild(wb);
                wb.classList.add('dragging'); 
                updateDragPos(e.clientX, e.clientY);
            };
        }
    }

    function scrub(e, i) {
        const can = document.querySelectorAll('.work-station canvas')[i];
        if(!can) return;
        const ctx = can.getContext('2d');
        const rect = can.getBoundingClientRect();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath(); ctx.arc(e.clientX - rect.left, e.clientY - rect.top, state.brush, 0, Math.PI*2); ctx.fill();
        if(Math.random() > 0.9) checkClean(can, i);
    }

    function checkClean(can, i) {
        const pix = can.getContext('2d').getImageData(0,0,200,140).data;
        let count = 0; for(let p=3; p<pix.length; p+=512) if(pix[p] > 100) count++;
        if(count < 5) { 
            can.style.display = 'none'; 
            const wb = document.getElementById(`word-${i}`);
            if(wb) wb.classList.add('active'); 
        }
    }

    function devMode() {
        const code = prompt("Enter Developer Access Code:");
        if(code === "DLP") { state.money = 99999; updateUI(); }
    }

    function updateDragPos(x, y) {
        if(!state.dragTarget) return;
        state.dragTarget.style.left = (x - 90) + 'px';
        state.dragTarget.style.top = (y - 60) + 'px';
    }

    document.addEventListener('pointermove', (e) => {
        if(!state.dragTarget) return; 
        updateDragPos(e.clientX, e.clientY);
    });

    document.addEventListener('pointerup', (e) => {
        if(!state.dragTarget) return;
        const word = state.dragTarget;
        const bucket = document.getElementById(`bucket-${word.dataset.verb}`);
        let droppedBucket = null;
        
        document.querySelectorAll('.bucket').forEach(b => {
            const br = b.getBoundingClientRect();
            if(e.clientX > br.left && e.clientX < br.right && e.clientY > br.top && e.clientY < br.bottom) droppedBucket = b;
        });

        if(droppedBucket === bucket) {
            state.money += state.pay; 
            showFeedback(e.clientX, e.clientY, `+$${state.pay}`, "--success");
            bucket.classList.add('correct-flash'); 
            setTimeout(() => bucket.classList.remove('correct-flash'), 400);
            
            word.classList.remove('dragging');
            state.originalParent.style.visibility = 'hidden';
            word.remove(); 
            
            if([...document.querySelectorAll('.work-station')].every(s => s.style.visibility === 'hidden')) init();
        } else if (droppedBucket) {
            droppedBucket.classList.add('wrong-flash'); 
            setTimeout(() => droppedBucket.classList.remove('wrong-flash'), 400);
            returnToOrigin(word);
        } else { 
            returnToOrigin(word); 
        }
        state.dragTarget = null; 
        updateUI();
    });

    function returnToOrigin(word) {
        word.classList.remove('dragging'); 
        word.classList.add('returning');
        
        const rect = state.originalParent.getBoundingClientRect();
        word.style.left = rect.left + 'px';
        word.style.top = rect.top + 'px';
        
        setTimeout(() => {
            word.classList.remove('returning');
            word.style.left = '0px';
            word.style.top = '0px';
            state.originalParent.appendChild(word);
        }, 400);
    }

    function buyVisual(key, bgColor, gunkColor) {
        if(!state.owned[key] && state.money >= state.costs[key]) { state.money -= state.costs[key]; state.owned[key] = true; }
        if (state.owned[key]) {
            document.body.style.background = bgColor;
            document.documentElement.style.setProperty('--gunk', gunkColor);
            document.querySelectorAll('#decor-layer .decor-item').forEach(d => d.style.opacity = '0');
            if (key === 'aquarium') document.getElementById('aquarium-decor').style.opacity = '1';
            if (key === 'sakura') startSakura();
            init();
        }
        updateUI(); renderShop();
    }

    function startSakura() {
        const container = document.getElementById('sakura-decor');
        container.style.opacity = '1';
        container.innerHTML = '';
        for(let i=0; i<15; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerText = '🌸';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
            petal.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(petal);
        }
    }

    function buyDecor(key) {
        if(!state.owned[key] && state.money >= state.costs[key]) { state.money -= state.costs[key]; state.owned[key] = true; }
        if (state.owned[key]) {
            const d = document.getElementById(`${key}-decor`);
            d.style.opacity = d.style.opacity === '1' ? '0' : '1';
        }
        updateUI(); renderShop();
    }

    function toggleShop(o) { document.getElementById('shop-overlay').style.display = o ? 'flex' : 'none'; if(o) renderShop(); }
    function switchTab(t, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        document.querySelectorAll('.shop-grid').forEach(g => g.style.display = 'none');
        document.getElementById('tab-' + t).style.display = 'grid';
    }

    function renderShop() {
        const tileBtnDisabled = state.tiles >= 6;
        document.getElementById('tab-upgrades').innerHTML = `
            <div class="shop-item"><h3>🧼 Wide Brush</h3><p>$${state.costs.area}</p><button class="buy-btn" onclick="buy('area')">Buy</button></div>
            <div class="shop-item"><h3>🏗️ Extra Tile</h3><p>${tileBtnDisabled ? 'MAX' : '$' + state.costs.expand}</p>
                <button class="buy-btn" onclick="buy('expand')" ${tileBtnDisabled ? 'disabled' : ''}>${tileBtnDisabled ? 'MAXED' : 'Buy'}</button>
            </div>
            <div class="shop-item"><h3>💵 Better Pay</h3><p>$${state.costs.pay}</p><button class="buy-btn" onclick="buy('pay')">Buy</button></div>
        `;
        document.getElementById('tab-visuals').innerHTML = `
            <div class="shop-item"><h3>🌸 Sakura Mode</h3><p>$500</p><button class="buy-btn" onclick="buyVisual('sakura', '#ffd1dc', '#5c3131')">${state.owned.sakura ? 'Activate' : 'Buy'}</button></div>
            <div class="shop-item"><h3>🐋 Aquarium</h3><p>$500</p><button class="buy-btn" onclick="buyVisual('aquarium', '#01579b', '#ff7043')">${state.owned.aquarium ? 'Activate' : 'Buy'}</button></div>
            <div class="shop-item"><h3>🪴 Bonsai</h3><p>$750</p><button class="buy-btn" onclick="buyDecor('bonsai')">${state.owned.bonsai ? 'Activate' : 'Buy'}</button></div>
            <div class="shop-item"><h3>🪨 Garden</h3><p>$600</p><button class="buy-btn" onclick="buyDecor('garden')">${state.owned.garden ? 'Activate' : 'Buy'}</button></div>
        `;
    }

    function buy(k) {
        if(state.money >= state.costs[k]) {
            state.money -= state.costs[k];
            if(k==='area') state.brush += 10;
            if(k==='expand') state.tiles = Math.min(6, state.tiles + 1);
            if(k==='pay') state.pay += 5;
            state.costs[k] *= 2; updateUI(); renderShop(); init();
        }
    }

    function showFeedback(x, y, text, color) {
        const f = document.createElement('div'); f.className = 'feedback'; f.innerText = text;
        f.style.left = x + 'px'; f.style.top = y + 'px'; f.style.color = `var(${color})`;
        document.body.appendChild(f); setTimeout(() => f.remove(), 800);
    }

    function confirmReset() { if(confirm("Reset progress?")) location.reload(); }
    function updateUI() { document.getElementById('m-display').innerText = state.money; }

    init();
</script>
</body>
</html>
