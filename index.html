<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gunk Scrubber Zen</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0f7fa; --primary: #00acc1; --dark: #006064; --accent: #ffb300;
            --white: #ffffff; --gunk: #654321; --success: #4caf50; --powerup: #9c27b0;
        }
        * { touch-action: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--dark); 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        header { width: 100%; padding: 10px; display: flex; justify-content: space-around; align-items: center; background: rgba(255,255,255,0.8); z-index: 100; }
        .stat-card { background: var(--white); padding: 8px 15px; border-radius: 50px; font-weight: 700; border: 2px solid var(--primary); }
        #game-floor { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; width: 95%; margin: auto; z-index: 5; }
        .work-station { position: relative; width: 140px; height: 100px; background: var(--white); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--white); transition: transform 0.2s; }
        .work-station.selected { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
        .word-box { font-weight: 700; font-size: 0.8rem; z-index: 1; pointer-events: none; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; border-radius: 11px; width: 100%; height: 100%; touch-action: none; }
        #buckets { display: flex; gap: 5px; padding: 15px 0; width: 100%; justify-content: center; z-index: 100; }
        .bucket { width: 80px; height: 60px; background: var(--white); border: 2px dashed var(--primary); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 0.65rem; }
        #powerup-ui { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
        .p-btn { background: var(--powerup); color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; box-shadow: 0 4px 0 #4a148c; }
        .p-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #4a148c; }
        .bug { position: absolute; font-size: 2rem; z-index: 150; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .exterminator { position: absolute; font-size: 2.5rem; z-index: 160; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; }
        #shop-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 37, 26, 0.95); color: white; z-index: 200; display: none; flex-direction: column; align-items: center; padding: 40px 20px; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        .shop-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; }
        .buy-btn { background: var(--success); color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; font-weight: 700; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="stat-card">💰 $<span id="m-display">0</span></div>
        <button class="stat-card" style="background: var(--primary); color: white;" onclick="toggleShop(true)">🛒 Shop</button>
    </header>

    <div id="game-floor"></div>

    <div id="powerup-ui">
        <button class="p-btn" onpointerdown="useSpray()">🧴 Spray (<span id="count-spray">0</span>)</button>
        <button class="p-btn" onpointerdown="spawnDude()">👨‍🔧 Guard (<span id="count-dude">0</span>)</button>
    </div>

    <div id="buckets">
        <div class="bucket" onpointerdown="checkMatch('going')">🏃 going</div>
        <div class="bucket" onpointerdown="checkMatch('doing')">🥋 doing</div>
        <div class="bucket" onpointerdown="checkMatch('playing')">🎮 playing</div>
    </div>

    <div id="shop-overlay">
        <h1 style="color: var(--accent);">Zen Shop</h1>
        <div class="shop-grid">
            <div class="shop-item">Brush Size<button class="buy-btn" onclick="buy('area')">Buy ($<span id="cost-area">15</span>)</button></div>
            <div class="shop-item">New Tile<button class="buy-btn" onclick="buy('expand')">
